<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📈 네이버 주식 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:    #0f1117;
      --card:  #1a1d27;
      --border:#2a2d3a;
      --text:  #e2e8f0;
      --muted: #8892a4;
      --up:    #22c55e;
      --down:  #ef4444;
      --blue:  #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    #updated { font-size: .8rem; color: var(--muted); }
    #tabs { display: flex; gap: 8px; padding: 20px 32px 0; flex-wrap: wrap; }
    .tab { padding: 6px 16px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: .85rem; transition: all .2s; }
    .tab:hover { border-color: var(--blue); color: var(--text); }
    .tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    main { padding: 24px 32px; display: grid; gap: 20px; }
    #summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .kpi-label { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
    .kpi-value { font-size: 1.6rem; font-weight: 700; }
    .kpi-value.up { color: var(--up); }
    .kpi-value.down { color: var(--down); }
    .kpi-value.neu { color: var(--text); }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .chart-card h2 { font-size: .9rem; font-weight: 600; margin-bottom: 16px; color: var(--muted); }
    #table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { padding: 12px 16px; text-align: right; color: var(--muted); font-weight: 500; }
    th:first-child { text-align: left; }
    td { padding: 12px 16px; text-align: right; border-bottom: 1px solid var(--border); }
    td:first-child { text-align: left; font-weight: 600; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.03); }
    .up { color: var(--up); }
    .down { color: var(--down); }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); font-size: 1rem; color: var(--muted); }
  </style>
</head>
<body>

<div id="loading">⏳ 데이터 불러오는 중...</div>

<header>
  <h1>📈 네이버 주식 대시보드</h1>
  <span id="updated">–</span>
</header>

<div id="tabs"></div>

<main>
  <div id="summary"></div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
    <div class="chart-card">
      <h2>종가 추이 (최근 60 거래일)</h2>
      <canvas id="lineChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <h2>수익률 비교 (현재 선택 종목)</h2>
      <canvas id="barChart" height="220"></canvas>
    </div>
  </div>
  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>종목</th>
          <th>현재가</th>
          <th>주간 등락률</th>
          <th>월간 등락률</th>
          <th>3개월 등락률</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
async function load() {
  const res = await fetch('./data/stocks.json?t=' + Date.now());
  return await res.json();
}

let lineChart, barChart;
const fmt = n => n?.toLocaleString('ko-KR') ?? '-';
const pct = v => v == null ? '-' : (v > 0 ? '+' : '') + v + '%';
const cls = v => v == null ? '' : v > 0 ? 'up' : v < 0 ? 'down' : '';

function render(data, activeCode) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('updated').textContent = '업데이트: ' + data.updated_at;

  const stocks = Object.values(data.stocks);
  const active = data.stocks[activeCode] || stocks[0];

  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  stocks.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (s.code === active.code ? ' active' : '');
    btn.textContent = s.name;
    btn.onclick = () => render(data, s.code);
    tabsEl.appendChild(btn);
  });

  const r = active.returns;
  const kpis = [
    { label: '현재가',       val: fmt(r.current) + '원', cls: 'neu' },
    { label: '주간 등락률',  val: pct(r.weekly),          cls: cls(r.weekly) },
    { label: '월간 등락률',  val: pct(r.monthly),         cls: cls(r.monthly) },
    { label: '3개월 등락률', val: pct(r.three_month),     cls: cls(r.three_month) },
  ];
  document.getElementById('summary').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value ${k.cls}">${k.val}</div>
    </div>
  `).join('');

  const prices = [...active.prices].reverse();
  const labels = prices.map(p => p.date);
  const closes = prices.map(p => p.close);

  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: active.name,
        data: closes,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,.1)',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8892a4', maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#8892a4', callback: v => v.toLocaleString() }, grid: { color: '#2a2d3a' } },
      }
    }
  });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: ['주간', '월간', '3개월'],
      datasets: [{
        label: active.name,
        data: [r.weekly ?? 0, r.monthly ?? 0, r.three_month ?? 0],
        backgroundColor: [r.weekly, r.monthly, r.three_month].map(v =>
          v > 0 ? 'rgba(34,197,94,.7)' : 'rgba(239,68,68,.7)'
        ),
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8892a4' }, grid: { display: false } },
        y: { ticks: { color: '#8892a4', callback: v => v + '%' }, grid: { color: '#2a2d3a' } },
      }
    }
  });

  document.getElementById('tbody').innerHTML = stocks.map(s => {
    const rv = s.returns;
    return `<tr>
      <td>${s.name}</td>
      <td>${fmt(rv.current)}원</td>
      <td class="${cls(rv.weekly)}">${pct(rv.weekly)}</td>
      <td class="${cls(rv.monthly)}">${pct(rv.monthly)}</td>
      <td class="${cls(rv.three_month)}">${pct(rv.three_month)}</td>
    </tr>`;
  }).join('');
}

load()
  .then(data => render(data, Object.keys(data.stocks)[0]))
  .catch(err => {
    document.getElementById('loading').textContent = '❌ 데이터 로드 실패: ' + err.message;
  });
</script>
</body>
</html>
